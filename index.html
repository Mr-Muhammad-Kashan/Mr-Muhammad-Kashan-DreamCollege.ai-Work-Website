<!-- PAGE: index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/jpeg" href="resources/Profile%20Picture/me.jpg">

        <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Kashan's Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
    

    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <div class="dashboard-layout">
        <!-- Sidebar injected here -->
        <div id="sidebar"></div>

        <div class="main-wrapper">
            <!-- Topbar injected here -->
            <div id="topbar"></div>

            <main class="content">
                <div class="hero-section stagger-in">
                    <div class="hero-avatar-container">
                        <div class="hero-avatar">
                            <img id="hero-avatar-img" src="resources/Profile Picture/me.jpg" alt="Profile">
                        </div>
                        <div class="hero-name" id="hero-name-display">Muhammad Kashan</div>
                        <div class="hero-role" id="hero-role-display">Software Engineer</div>
                    </div>
                    <div class="hero-content">
                        <h1 class="hero-greeting" id="dynamic-greeting">Good Morning, Kashan! 👋</h1>
                        <p class="hero-tagline">Here's your workspace overview</p>
                        <div class="hero-date" id="hero-date">October 24, 2023</div>
                        
                        <!-- Manager Shortcuts (Hidden by default) -->

                        <div id="manager-shortcuts" style="display: none; margin-top: 24px; gap: 16px; flex-wrap: wrap;">
                            <button onclick="window.location.href='tasks.html'" class="btn-manager">
                                <span style="font-size:1.2rem;">📝</span> Assign Tasks to Him
                            </button>
                            <button onclick="window.location.href='worklog.html'" class="btn-manager">
                                <span style="font-size:1.2rem;">⏱️</span> Check His Work Log
                            </button>
                            <button onclick="window.location.href='projects.html'" class="btn-manager">
                                <span style="font-size:1.2rem;">📁</span> View His Projects
                            </button>
                            <button onclick="window.location.href='monthly-report.html'" class="btn-manager">
                                <span style="font-size:1.2rem;">📊</span> Check Monthly Report
                            </button>
                        </div>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="card stat-card stagger-in" style="border-left-color: var(--primary);">
                        <div class="stat-icon" style="background: var(--gradient-main);">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
                        </div>
                        <div class="stat-info">
                            <h3 class="counter" id="stat-projects" data-target="0">0</h3>
                            <p>Total Projects</p>
                        </div>
                    </div>
                    <div class="card stat-card stagger-in" style="border-left-color: var(--accent);">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #EC4899, #F43F5E);">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm-2 14l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
                        </div>
                        <div class="stat-info">
                            <h3 class="counter" id="stat-tasks" data-target="0">0</h3>
                            <p>Pending Tasks</p>
                        </div>
                    </div>
                    <div class="card stat-card stagger-in" style="border-left-color: var(--accent-secondary);">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #06B6D4, #0EA5E9);">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
                        </div>
                        <div class="stat-info">
                            <h3 class="counter" id="stat-hours" data-target="0">0</h3>
                            <p id="stat-hours-label">Hours This Month</p>
                        </div>
                    </div>
                    <div class="card stat-card stagger-in" style="border-left-color: #F59E0B;">
                        <div class="stat-icon" style="background: linear-gradient(135deg, #F59E0B, #D97706);">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
                        </div>
                        <div class="stat-info">
                            <h3 class="counter" id="stat-today" data-target="0">0</h3>
                            <p>Hours Today</p>
                        </div>
                    </div>
                </div>

                <div class="two-column">
                    <div class="card section-card section-worklog stagger-in">
                        <div class="section-header">
                            <h2 class="section-title">Recent Work Log</h2>
                            <a href="worklog.html" class="view-all">View All</a>
                        </div>
                        <div class="timeline" id="recent-worklog">
                            <!-- Injected by JS -->
                            <div class="skeleton" style="height: 60px; margin-bottom: 16px;"></div>
                            <div class="skeleton" style="height: 60px; margin-bottom: 16px;"></div>
                            <div class="skeleton" style="height: 60px;"></div>
                        </div>
                    </div>

                    <div class="card section-card section-tasks stagger-in">
                        <div class="section-header">
                            <h2 class="section-title">Active Tasks</h2>
                            <a href="tasks.html" class="view-all">View All</a>
                        </div>
                        <div id="recent-tasks">
                            <!-- Injected by JS -->
                            <div class="skeleton" style="height: 60px; margin-bottom: 16px;"></div>
                            <div class="skeleton" style="height: 60px; margin-bottom: 16px;"></div>
                            <div class="skeleton" style="height: 60px;"></div>
                        </div>
                    </div>
                </div>

                <div class="card section-card section-projects stagger-in">
                    <div class="section-header">
                        <h2 class="section-title">Recent Projects</h2>
                        <a href="projects.html" class="view-all">View All</a>
                    </div>
                    <div class="projects-row" id="recent-projects">
                        <!-- Injected by JS -->
                        <div class="skeleton" style="height: 180px;"></div>
                        <div class="skeleton" style="height: 180px;"></div>
                        <div class="skeleton" style="height: 180px;"></div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <!-- Scripts -->
    <script defer src="js/firebase-init.js?v=4"></script>
    <script defer src="js/auth.js?v=4"></script>
    <script defer src="js/dashboard.js?v=4"></script>
</body>
</html>
