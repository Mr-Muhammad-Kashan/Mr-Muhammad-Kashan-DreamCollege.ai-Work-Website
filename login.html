<!-- PAGE: login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="https://i.ibb.co/3s6hB8w/kashan.jpg">

        <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kashan's Portfolio</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    

    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-card stagger-in">
        <img src="resources/logos/logo1.png" alt="Logo" class="login-logo" onerror="this.src='https://via.placeholder.com/80?text=Logo'">
        <h1 class="login-title text-gradient">Kashan's Portfolio</h1>
        <div class="login-subtitle">Welcome to my work profile</div>

        <form id="login-form">
            <div class="input-group">
                <svg class="icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <svg class="icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <button type="submit" class="btn btn-primary login-btn" id="login-btn">
                <span class="btn-text">Sign In</span>
                <svg class="spinner" viewBox="25 25 50 50">
                    <circle cx="50" cy="50" r="20" fill="none"></circle>
                </svg>
            </button>
        </form>

        <div class="error-message" id="error-msg"></div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    
    <!-- Scripts -->
    <script defer src="js/firebase-init.js?v=4"></script>
    <script defer src="js/auth.js?v=4"></script>

    <script>
        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const btnText = loginBtn.querySelector('.btn-text');
        const spinner = loginBtn.querySelector('.spinner');
        const errorMsg = document.getElementById('error-msg');
        const loginCard = document.querySelector('.login-card');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Whitelist: Only these two users are authorized
            const ALLOWED_EMAILS = [
                'mr.muhammad.kashan.tariq@gmail.com',
                'julialiang2015@gmail.com'
            ];

            if (!ALLOWED_EMAILS.includes(email.toLowerCase())) {
                errorMsg.textContent = 'Error 4.4 — Incorrect credentials. Please check your email and password.';
                errorMsg.style.display = 'block';
                loginCard.classList.remove('shake');
                void loginCard.offsetWidth;
                loginCard.classList.add('shake');
                return;
            }

            // Loading state
            btnText.style.display = 'none';
            spinner.style.display = 'block';
            loginBtn.style.pointerEvents = 'none';
            errorMsg.style.display = 'none';
            errorMsg.classList.remove('shake');

            try {
                await auth.signInWithEmailAndPassword(email, password);
                // Auth state listener in auth.js will handle redirect
            } catch (error) {
                // Reset state
                btnText.style.display = 'block';
                spinner.style.display = 'none';
                loginBtn.style.pointerEvents = 'all';
                
                // User-friendly error messages
                let msg = 'Error 4.4 — Incorrect credentials. Please check your email and password.';
                if (error.code === 'auth/too-many-requests') {
                    msg = 'Too many failed attempts. Please try again later.';
                } else if (error.code === 'auth/invalid-email') {
                    msg = 'Invalid email format. Please enter a valid email address.';
                }
                
                errorMsg.textContent = msg;
                errorMsg.style.display = 'block';
                
                // Trigger shake
                loginCard.classList.remove('shake');
                void loginCard.offsetWidth;
                loginCard.classList.add('shake');
            }
        });
    </script>
</body>
</html>
